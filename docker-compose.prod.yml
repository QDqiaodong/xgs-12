services:
  mysql:
    image: mysql:8.0
    container_name: xgs-12-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: retail_material_db
      MYSQL_USER: ${MYSQL_USER:-retail_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-retail123456}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-33112}:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
      - --disable-log-bin
      - --innodb-buffer-pool-size=1G
      - --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retail_network_prod

  redis:
    image: redis:7.0-alpine
    container_name: xgs-12-redis-prod
    restart: always
    ports:
      - "127.0.0.1:${REDIS_PORT:-63112}:6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retail_network_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: xgs-12-backend-prod
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/retail_material_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-retail_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-retail123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DB_USERNAME: ${MYSQL_USER:-retail_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-retail123456}
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
      LANG: C.UTF-8
    ports:
      - "127.0.0.1:${BACKEND_PORT:-19112}:8096"
    volumes:
      - backend_prod_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - retail_network_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: xgs-12-frontend-prod
    restart: always
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-18112}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - retail_network_prod

volumes:
  mysql_prod_data:
  redis_prod_data:
  backend_prod_logs:

networks:
  retail_network_prod:
    driver: bridge
