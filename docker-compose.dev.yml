services:
  mysql:
    image: mysql:8.0
    container_name: xgs-12-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: retail_material_db
      MYSQL_USER: retail_user
      MYSQL_PASSWORD: retail123456
    ports:
      - "127.0.0.1:${MYSQL_PORT:-33112}:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
      - --disable-log-bin
    networks:
      - retail_network_dev

  redis:
    image: redis:7.0-alpine
    container_name: xgs-12-redis-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-63112}:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    networks:
      - retail_network_dev

volumes:
  mysql_dev_data:
  redis_dev_data:

networks:
  retail_network_dev:
    driver: bridge
